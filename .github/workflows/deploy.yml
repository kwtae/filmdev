name: Deploy to cPanel via FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install dependencies and Build
      run: |
        npm install
        npm run build
        
    - name: Deploy to cPanel (FTP)
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./dist/
        # Make sure this points to the exact public html path of your cPanel subdomain or subfolder
        # e.g., /public_html/filmdev/
        server-dir: /public_html/filmdev/
